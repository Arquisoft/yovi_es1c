openapi: 3.0.3
info:
  title: YOVI Game Service API
  version: 1.0.0
  description: HTTP contract for game, matchmaking and online session endpoints behind the gateway `/api/game`.

servers:
  - url: /api/game

security:
  - bearerAuth: []

paths:
  /matches:
    post:
      summary: Create a new match
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMatchRequest'
            example:
              boardSize: 8
              difficulty: medium
      responses:
        '201':
          description: Match created
          content:
            application/json:
              schema:
                type: object
                properties:
                  matchId:
                    type: integer
              example:
                matchId: 42
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /matches/{id}:
    get:
      summary: Get match by id (owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Match data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Match'
              example:
                id: 123
                user_id: 1
                board_size: 8
                difficulty: medium
                status: ONGOING
                winner: null
                mode: BOT
                created_at: '2026-04-06T12:00:00Z'
        '403':
          description: Not the match owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Match not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /matches/{id}/moves:
    post:
      summary: Add a move to a match
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMoveRequest'
            example:
              position_yen: a1
              player: USER
              moveNumber: 1
      responses:
        '201':
          description: Move added
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Move added
        '400':
          description: Validation error or match already finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not the match owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Match not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Invalid move or match already finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /matches/{id}/finish:
    put:
      summary: Finish a match with a result
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinishMatchRequest'
            example:
              winner: USER
      responses:
        '200':
          description: Match finished
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Match finished
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not the match owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Match not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Match already finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stats/{userId}:
    get:
      summary: Get aggregated stats for a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsDto'
              example:
                totalMatches: 15
                wins: 10
                losses: 5
                matches:
                  - matchId: '42'
                    createdAt: '2026-04-06T12:00:00Z'
                    mode: BOT
                    status: win
        '400':
          description: Invalid userId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/queue:
    post:
      summary: Join matchmaking queue
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [boardSize]
              properties:
                boardSize:
                  type: integer
                  example: 11
      responses:
        '201':
          description: Queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  queued:
                    type: boolean
                  joinedAt:
                    type: integer
        '503':
          description: Matchmaking unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Cancel matchmaking queue
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Queue cancelled

  /online/queue/match:
    get:
      summary: Poll for match assignment
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Match status
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      matched:
                        type: boolean
                        example: false
                  - type: object
                    properties:
                      matched:
                        type: boolean
                        example: true
                      matchId:
                        type: string
                      opponent:
                        type: string
                      revealAfterGame:
                        type: boolean
        '503':
          description: Matchmaking unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/sessions/active:
    get:
      summary: Get active online session for authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active session exists
        '204':
          description: No active session
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/sessions/{matchId}:
    get:
      summary: Get session snapshot
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: matchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Snapshot
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/sessions/{matchId}/moves:
    post:
      summary: Submit move in online session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: matchId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [move, expectedVersion]
              properties:
                move:
                  type: object
                  required: [row, col]
                  properties:
                    row:
                      type: integer
                    col:
                      type: integer
                expectedVersion:
                  type: integer
      responses:
        '201':
          description: Move applied
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized for this move
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Version/session conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/sessions/{matchId}/reconnect:
    post:
      summary: Reconnect to a paused session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: matchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reconnected
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Reconnect expired/session terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/sessions/{matchId}/abandon:
    post:
      summary: Abandon session (idempotent)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: matchId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session abandoned

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateMatchRequest:
      type: object
      required: [boardSize, difficulty]
      properties:
        boardSize:
          type: integer
          example: 11
        difficulty:
          type: string
          enum: [easy, medium, hard, expert]
          example: medium
        mode:
          type: string
          enum: [BOT, ONLINE, LOCAL_2P]
          default: BOT

    AddMoveRequest:
      type: object
      required: [position_yen, player, moveNumber]
      properties:
        position_yen:
          type: string
          description: Move position in YEN notation
          example: a1
        player:
          type: string
          enum: [USER, BOT]
        moveNumber:
          type: integer
          minimum: 1

    FinishMatchRequest:
      type: object
      required: [winner]
      properties:
        winner:
          type: string
          enum: [USER, BOT]

    Match:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        board_size:
          type: integer
        difficulty:
          type: string
        status:
          type: string
          enum: [ONGOING, FINISHED]
        winner:
          type: string
          nullable: true
          enum: [USER, BOT]
        mode:
          type: string
          enum: [BOT, ONLINE, LOCAL_2P]
        created_at:
          type: string
          format: date-time

    MatchDto:
      type: object
      properties:
        matchId:
          type: string
        createdAt:
          type: string
          format: date-time
        mode:
          type: string
        status:
          type: string
          enum: [win, lose]

    StatsDto:
      type: object
      properties:
        totalMatches:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        matches:
          type: array
          items:
            $ref: '#/components/schemas/MatchDto'

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: SESSION_NOT_FOUND
        message:
          type: string
          example: Online session not found
        details:
          nullable: true
