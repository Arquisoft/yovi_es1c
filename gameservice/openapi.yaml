openapi: 3.0.3
info:
  title: YOVI Game Service API
  version: 1.0.0
  description: HTTP contract for game, matchmaking and online session endpoints behind the gateway `/api/game`.

servers:
  - url: /api/game

security:
  - bearerAuth: []

paths:
  /matches:
    post:
      summary: Create a new match
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMatchRequest'
            example:
              boardSize: 8
              difficulty: medium
              mode: BOT
              rules:
                pieRule:
                  enabled: false
                honey:
                  enabled: false
                  blockedCells: []
      responses:
        '201':
          description: Match created
          content:
            application/json:
              schema:
                type: object
                properties:
                  matchId:
                    type: integer
              example:
                matchId: 42
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Auth Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /matches/{id}:
    get:
      summary: Get match by id (owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Match data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Match'
              example:
                id: 123
                user_id: 1
                board_size: 8
                difficulty: medium
                status: ONGOING
                winner: null
                mode: BOT
                created_at: '2026-04-06T12:00:00Z'
        '403':
          description: Not the match owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Match not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /matches/{id}/moves:
    post:
      summary: Add a move to a match
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMoveRequest'
            example:
              position_yen: a1
              player: USER
              moveNumber: 1
      responses:
        '202':
          description: Move accepted and bot processing queued when needed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoveAcceptedResponse'
              example:
                status: processing
                matchId: 42
        '400':
          description: Validation error or match already finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not the match owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Match not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Invalid move or match already finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /matches/{id}/finish:
    put:
      summary: Finish a match with a result
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinishMatchRequest'
            example:
              winner: USER
      responses:
        '200':
          description: Match finished
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Match finished
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not the match owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Match not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Match already finished
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stats/{userId}:
    get:
      summary: Get aggregated stats for a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsDto'
              example:
                totalMatches: 15
                wins: 10
                losses: 5
                matches:
                  - matchId: '42'
                    createdAt: '2026-04-06T12:00:00Z'
                    mode: BOT
                    status: win
        '400':
          description: Invalid userId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rankings:
    get:
      summary: Get the global ELO leaderboard
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of entries to return (1..100).
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of entries to skip before collecting the page.
      responses:
        '200':
          description: Leaderboard page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'
              example:
                total: 125
                limit: 20
                offset: 0
                entries:
                  - rank: 1
                    userId: 42
                    username: alice
                    eloRating: 1875
                    gamesPlayed: 128
                    peakRating: 1902
                    lastUpdated: '2026-04-18T09:32:10Z'
                  - rank: 2
                    userId: 17
                    username: bob
                    eloRating: 1790
                    gamesPlayed: 88
                    peakRating: 1821
                    lastUpdated: '2026-04-17T21:15:44Z'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Ranking service not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rankings/{userId}:
    get:
      summary: Get the ranking entry for a single user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User ranking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRankingDto'
              example:
                rank: 7
                userId: 42
                username: alice
                eloRating: 1432
                gamesPlayed: 22
                peakRating: 1450
                lastUpdated: '2026-04-18T09:32:10Z'
        '400':
          description: Invalid userId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User has no ranking yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Ranking service not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/queue:
    post:
      summary: Join matchmaking queue
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [boardSize]
              properties:
                boardSize:
                  type: integer
                  example: 11
                rules:
                  $ref: '#/components/schemas/MatchRules'
      responses:
        '201':
          description: Queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  queued:
                    type: boolean
                  joinedAt:
                    type: integer
        '503':
          description: Matchmaking unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Cancel matchmaking queue
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Queue cancelled

  /online/queue/match:
    get:
      summary: Poll for match assignment
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Match status
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      matched:
                        type: boolean
                        example: false
                  - type: object
                    properties:
                      matched:
                        type: boolean
                        example: true
                      matchId:
                        type: string
                      opponent:
                        type: string
                      revealAfterGame:
                        type: boolean
        '503':
          description: Matchmaking unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/sessions/active:
    get:
      summary: Get active online session for authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active session exists
        '204':
          description: No active session
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/sessions/{matchId}:
    get:
      summary: Get session snapshot
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: matchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Snapshot
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/sessions/{matchId}/moves:
    post:
      summary: Submit move in online session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: matchId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [move, expectedVersion]
              properties:
                move:
                  type: object
                  required: [row, col]
                  properties:
                    row:
                      type: integer
                    col:
                      type: integer
                expectedVersion:
                  type: integer
      responses:
        '201':
          description: Move applied
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Not authorized for this move
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Version/session conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/sessions/{matchId}/reconnect:
    post:
      summary: Reconnect to a paused session
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: matchId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reconnected
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Reconnect expired/session terminal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /online/sessions/{matchId}/abandon:
    post:
      summary: Abandon session (idempotent)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: matchId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session abandoned

  /metrics:
    get:
      summary: Prometheus metrics
      security: []
      servers:
        - url: /
          description: Service root path
        - url: http://gameservice:3002
          description: Internal Docker network endpoint
      responses:
        '200':
          description: Metrics payload
          content:
            text/plain:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateMatchRequest:
      type: object
      required: [boardSize, difficulty]
      properties:
        boardSize:
          type: integer
          minimum: 1
          example: 11
        difficulty:
          type: string
          enum: [easy, medium, hard, impossible]
          example: medium
        mode:
          type: string
          enum: [BOT, ONLINE, LOCAL_2P]
          default: BOT
        rules:
          $ref: '#/components/schemas/MatchRules'

    AddMoveRequest:
      type: object
      required: [position_yen, player, moveNumber]
      properties:
        position_yen:
          type: string
          description: Move position in YEN notation
          example: a1
        player:
          type: string
          enum: [USER, BOT]
        moveNumber:
          type: integer
          minimum: 1

    FinishMatchRequest:
      type: object
      required: [winner]
      properties:
        winner:
          type: string
          enum: [USER, BOT]

    Match:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        board_size:
          type: integer
        difficulty:
          type: string
        status:
          type: string
          enum: [ONGOING, FINISHED]
        winner:
          type: string
          nullable: true
          enum: [USER, BOT]
        mode:
          type: string
          enum: [BOT, ONLINE, LOCAL_2P]
        rules:
          $ref: '#/components/schemas/MatchRules'
        created_at:
          type: string
          format: date-time

    MatchRules:
      type: object
      description: |
        If omitted in requests, the service applies classic rules.
        `blockedCells` must be omitted or empty in client requests; Honey cells are generated server-side when Honey is enabled.
      properties:
        pieRule:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
        honey:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
            blockedCells:
              type: array
              default: []
              items:
                $ref: '#/components/schemas/BlockedCell'

    MoveAcceptedResponse:
      type: object
      required: [status, matchId]
      properties:
        status:
          type: string
          enum: [processing]
        matchId:
          type: integer

    BlockedCell:
      type: object
      required: [row, col]
      properties:
        row:
          type: integer
          minimum: 0
        col:
          type: integer
          minimum: 0

    MatchDto:
      type: object
      properties:
        matchId:
          type: string
        createdAt:
          type: string
          format: date-time
        mode:
          type: string
        status:
          type: string
          enum: [win, lose]

    StatsDto:
      type: object
      properties:
        totalMatches:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        matches:
          type: array
          items:
            $ref: '#/components/schemas/MatchDto'

    LeaderboardEntry:
      type: object
      required: [rank, userId, eloRating, gamesPlayed, peakRating, lastUpdated]
      properties:
        rank:
          type: integer
          minimum: 1
        userId:
          type: integer
        username:
          type: string
          nullable: true
        eloRating:
          type: integer
        gamesPlayed:
          type: integer
          minimum: 0
        peakRating:
          type: integer
        lastUpdated:
          type: string
          format: date-time

    LeaderboardResponse:
      type: object
      required: [total, limit, offset, entries]
      properties:
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        entries:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardEntry'

    UserRankingDto:
      allOf:
        - $ref: '#/components/schemas/LeaderboardEntry'

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: SESSION_NOT_FOUND
        error:
          type: string
          nullable: true
          description: Present on errors produced by the global Express error handler.
        message:
          type: string
          example: Online session not found
        details:
          nullable: true
