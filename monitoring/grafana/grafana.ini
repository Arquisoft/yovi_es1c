[server]
protocol = http
root_url = https://%(domain)s/grafana/
serve_from_sub_path = true
domain = localhost

[security]
cookie_secure = false
cookie_samesite = lax


[users]
default_theme = dark

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/yovi-overview.json

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer
hide_version = true