# Local mode: use this file when TARGET_ENV=local.
# Services are attached to the internal stack network.
services:
  k6-auth:
    image: grafana/k6:latest
    env_file:
      - .env
    volumes:
      - ./k6:/scripts
    environment:
      - TARGET_ENV=local
      - TARGET_URL=${TARGET_URL_DOCKER:-https://nginx}
      - TARGET_URL_REMOTE=${TARGET_URL_REMOTE:-https://yovi-es1c.duckdns.org}
      - K6_INSECURE_TLS=${K6_INSECURE_TLS:-true}
      - K6_PROMETHEUS_RW_SERVER_URL=${K6_PROMETHEUS_RW_SERVER_URL:-http://prometheus:9090/prometheus/api/v1/write}
    command: run --out experimental-prometheus-rw /scripts/auth.js
    networks:
      - yovi_net
    profiles:
      - auth

  k6-game:
    image: grafana/k6:latest
    env_file:
      - .env
    volumes:
      - ./k6:/scripts
    environment:
      - TARGET_ENV=local
      - TARGET_URL=${TARGET_URL_DOCKER:-https://nginx}
      - TARGET_URL_REMOTE=${TARGET_URL_REMOTE:-https://yovi-es1c.duckdns.org}
      - K6_INSECURE_TLS=${K6_INSECURE_TLS:-true}
      - K6_PROMETHEUS_RW_SERVER_URL=${K6_PROMETHEUS_RW_SERVER_URL:-http://prometheus:9090/prometheus/api/v1/write}
    command: run --out experimental-prometheus-rw /scripts/game.js
    networks:
      - yovi_net
    profiles:
      - game

  k6-matchmaking:
    image: grafana/k6:latest
    env_file:
      - .env
    volumes:
      - ./k6:/scripts
    environment:
      - TARGET_ENV=local
      - TARGET_URL=${TARGET_URL_DOCKER:-https://nginx}
      - TARGET_URL_REMOTE=${TARGET_URL_REMOTE:-https://yovi-es1c.duckdns.org}
      - K6_INSECURE_TLS=${K6_INSECURE_TLS:-true}
      - K6_PROMETHEUS_RW_SERVER_URL=${K6_PROMETHEUS_RW_SERVER_URL:-http://prometheus:9090/prometheus/api/v1/write}
    command: run --out experimental-prometheus-rw /scripts/matchmaking.js
    networks:
      - yovi_net
    profiles:
      - matchmaking

  artillery-online:
    build:
      context: ./artillery
    env_file:
      - .env
    volumes:
      - ./artillery:/scripts
    environment:
      - TARGET_URL=${TARGET_URL_DOCKER:-https://nginx}
      - LOADTEST_INSECURE_TLS=true
    command: run /scripts/online-session.local.yml
    networks:
      - yovi_net
    profiles:
      - online

  artillery-timeout:
    build:
      context: ./artillery
    env_file:
      - .env
    volumes:
      - ./artillery:/scripts
    environment:
      - TARGET_URL=${TARGET_URL_DOCKER:-https://nginx}
      - LOADTEST_INSECURE_TLS=true
    command: run /scripts/turn-timeout.local.yml
    networks:
      - yovi_net
    profiles:
      - timeout

networks:
  yovi_net:
    external: true
    name: yovi_es1c_monitor-net
