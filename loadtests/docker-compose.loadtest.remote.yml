version: '3.8'

# Remote mode: use this file when TARGET_ENV=remote.
# Services use public URL and DO NOT join internal stack network.
services:
  k6-auth:
    image: grafana/k6:latest
    env_file:
      - .env
    volumes:
      - ./k6:/scripts
    environment:
      - TARGET_ENV=remote
      - TARGET_URL=${TARGET_URL:-https://localhost}
      - TARGET_URL_REMOTE=${TARGET_URL_REMOTE:-https://yovi-es1c.duckdns.org}
      - K6_INSECURE_TLS=${K6_INSECURE_TLS:-false}
      - K6_PROMETHEUS_RW_SERVER_URL=${K6_PROMETHEUS_RW_SERVER_URL_REMOTE:-http://yovi-es1c.duckdns.org:9090/api/v1/write}
    command: run --out experimental-prometheus-rw /scripts/auth.js
    profiles:
      - auth

  k6-game:
    image: grafana/k6:latest
    env_file:
      - .env
    volumes:
      - ./k6:/scripts
    environment:
      - TARGET_ENV=remote
      - TARGET_URL=${TARGET_URL:-https://localhost}
      - TARGET_URL_REMOTE=${TARGET_URL_REMOTE:-https://yovi-es1c.duckdns.org}
      - K6_INSECURE_TLS=${K6_INSECURE_TLS:-false}
      - K6_PROMETHEUS_RW_SERVER_URL=${K6_PROMETHEUS_RW_SERVER_URL_REMOTE:-http://yovi-es1c.duckdns.org:9090/api/v1/write}
    command: run --out experimental-prometheus-rw /scripts/game.js
    profiles:
      - game

  k6-matchmaking:
    image: grafana/k6:latest
    env_file:
      - .env
    volumes:
      - ./k6:/scripts
    environment:
      - TARGET_ENV=remote
      - TARGET_URL=${TARGET_URL:-https://localhost}
      - TARGET_URL_REMOTE=${TARGET_URL_REMOTE:-https://yovi-es1c.duckdns.org}
      - K6_INSECURE_TLS=${K6_INSECURE_TLS:-false}
      - K6_PROMETHEUS_RW_SERVER_URL=${K6_PROMETHEUS_RW_SERVER_URL_REMOTE:-http://yovi-es1c.duckdns.org:9090/api/v1/write}
    command: run --out experimental-prometheus-rw /scripts/matchmaking.js
    profiles:
      - matchmaking

  artillery-online:
    build:
      context: ./artillery
    env_file:
      - .env
    volumes:
      - ./artillery:/scripts
    environment:
      - TARGET_URL=${TARGET_URL_REMOTE:-https://yovi-es1c.duckdns.org}
      - NODE_TLS_REJECT_UNAUTHORIZED=1
    command: run /scripts/online-session.yml
    profiles:
      - online

  artillery-timeout:
    build:
      context: ./artillery
    env_file:
      - .env
    volumes:
      - ./artillery:/scripts
    environment:
      - TARGET_URL=${TARGET_URL_REMOTE:-https://yovi-es1c.duckdns.org}
      - NODE_TLS_REJECT_UNAUTHORIZED=1
    command: run /scripts/turn-timeout.yml
    profiles:
      - timeout