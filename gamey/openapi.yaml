openapi: 3.1.0
info:
  title: Gamey Bot Server API
  description: REST API exposed by the Rust Game Y engine and bot server.
  version: 1.0.0

servers:
  - url: http://localhost:4000
    description: Local Docker/default server port
  - url: /api/gamey
    description: Public gateway path through Nginx

tags:
  - name: Operations
  - name: Bots
  - name: Competition

paths:
  /status:
    get:
      tags: [Operations]
      summary: Health check
      responses:
        '200':
          description: Server is running
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /metrics:
    get:
      tags: [Operations]
      summary: Prometheus metrics
      responses:
        '200':
          description: Metrics payload
          content:
            text/plain:
              schema:
                type: string

  /{api_version}/ybot/choose/{bot_id}:
    post:
      tags: [Bots]
      summary: Request one move from a bot
      description: |
        Accepts a YEN board as JSON and returns the coordinates selected by the requested bot.
        Handler-level errors are encoded as JSON `ErrorResponse` payloads. Because the handler returns
        `Result<Json<_>, Json<ErrorResponse>>`, those errors are serialized with HTTP 200 by Axum.
      parameters:
        - name: api_version
          in: path
          required: true
          schema:
            type: string
          example: v1
        - name: bot_id
          in: path
          required: true
          description: Bot id or alias.
          schema:
            type: string
          examples:
            alias:
              value: medium
            concrete:
              value: neural_mcts_s200
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YEN'
      responses:
        '200':
          description: Move chosen, or an application-level error payload.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MoveResponse'
                  - $ref: '#/components/schemas/ErrorResponse'

  /{api_version}/ybot/play:
    post:
      tags: [Bots]
      summary: Play one bot move and return the updated board
      parameters:
        - name: api_version
          in: path
          required: true
          schema:
            type: string
          example: v1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayRequest'
      responses:
        '200':
          description: Move played, or an application-level error payload.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PlayResponse'
                  - $ref: '#/components/schemas/ErrorResponse'

  /play:
    get:
      tags: [Competition]
      summary: Competition-style play endpoint
      description: |
        Accepts the board position as a JSON-encoded `position` query parameter.
        Returns either a coordinate move, `{ "action": "swap" }` when Pie rule applies, or
        `{ "action": "resign" }` when the bot has no valid move.
      parameters:
        - name: position
          in: query
          required: true
          description: URL-encoded JSON representation of a YEN board.
          schema:
            type: string
        - name: bot_id
          in: query
          required: false
          description: Bot id or alias. Defaults to `random`.
          schema:
            type: string
      responses:
        '200':
          description: Move or action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayCompetitionResponse'
        '400':
          description: Missing/invalid position or unknown bot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    YEN:
      type: object
      description: Y-game Exchange Notation board serialized as JSON.
      required: [size, turn, players, layout]
      properties:
        size:
          type: integer
          minimum: 1
          example: 3
        turn:
          type: integer
          enum: [0, 1]
          example: 0
        players:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: string
            enum: [B, R]
          example: [B, R]
        layout:
          type: string
          description: Rows separated by `/`; `.` is empty, `B` and `R` are player stones.
          example: './../...'
        rules:
          $ref: '#/components/schemas/MatchRules'

    Coordinates:
      type: object
      required: [x, y, z]
      properties:
        x:
          type: integer
          minimum: 0
        y:
          type: integer
          minimum: 0
        z:
          type: integer
          minimum: 0

    MoveResponse:
      type: object
      required: [api_version, bot_id, coords]
      properties:
        api_version:
          type: string
          example: v1
        bot_id:
          type: string
          example: medium
        coords:
          $ref: '#/components/schemas/Coordinates'

    PlayRequest:
      type: object
      required: [position]
      properties:
        position:
          $ref: '#/components/schemas/YEN'
        bot_id:
          type: string
          description: Defaults to `random` when omitted.
          example: easy

    PlayResponse:
      type: object
      required: [api_version, bot_id, position]
      properties:
        api_version:
          type: string
          example: v1
        bot_id:
          type: string
          example: easy
        position:
          $ref: '#/components/schemas/YEN'

    PlayCompetitionResponse:
      oneOf:
        - type: object
          required: [coords]
          properties:
            coords:
              $ref: '#/components/schemas/Coordinates'
        - type: object
          required: [action]
          properties:
            action:
              type: string
              enum: [swap, resign]

    ErrorResponse:
      type: object
      required: [message]
      properties:
        api_version:
          type: string
          nullable: true
        bot_id:
          type: string
          nullable: true
        message:
          type: string

    MatchRules:
      type: object
      properties:
        pieRule:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
        honey:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
            blockedCells:
              type: array
              default: []
              items:
                $ref: '#/components/schemas/BlockedCell'

    BlockedCell:
      type: object
      required: [row, col]
      properties:
        row:
          type: integer
          minimum: 0
        col:
          type: integer
          minimum: 0
