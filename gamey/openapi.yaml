openapi: 3.1.0
info:
  title: GameY Bot Server API
  description: REST API for querying Y game bots.
  version: "1.0.0"

servers:
  - url: http://localhost:4000
    description: Local server (Docker default port)

paths:
  /status:
    get:
      summary: Health check endpoint
      description: Returns "OK" if the server is running.
      responses:
        "200":
          description: Server is running
          content:
            text/plain:
              schema:
                type: string
                example: "OK"

  /{api_version}/ybot/choose/{bot_id}:
    post:
      summary: Request a move from a bot
      description: |
        Given a YEN board state in JSON format, returns a move chosen by the specified bot.
        Only the following bot aliases are supported:
        - `easy` → `random`
        - `medium` → `minimax_set_d2`
        - `hard` → `minimax_set_d4`
        If an error occurs (invalid YEN, bot not found, or no valid moves), the server still returns HTTP 200 OK with an ErrorResponse object in JSON.
      parameters:
        - name: api_version
          in: path
          required: true
          description: API version (currently only "v1" is supported)
          schema:
            type: string
            enum: [v1]
        - name: bot_id
          in: path
          required: true
          description: Bot alias (difficulty)
          schema:
            type: string
            enum: [easy, medium, hard]
            example: easy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YEN'
            examples:
              yen_example:
                summary: Example of YEN board in JSON
                value:
                  size: 3
                  turn: 0
                  players: [ "B", "R" ]
                  layout: "./B./.RB"
      responses:
        "200":
          description: Move chosen successfully or an error occurred
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MoveResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                move:
                  summary: Move chosen successfully
                  value:
                    api_version: "v1"
                    bot_id: "easy"
                    coords:
                      x: 1
                      y: 2
                      z: 0
                bot_not_found:
                  summary: Bot not found error
                  value:
                    message: "Bot not found: unknown_bot, available bots: [easy, medium, hard]"
                    api_version: "v1"
                    bot_id: "unknown_bot"
                invalid_yen:
                  summary: Invalid YEN format error
                  value:
                    message: "Invalid YEN format: unexpected character at position 4"
                    api_version: "v1"
                    bot_id: "easy"
                no_valid_moves:
                  summary: Bot has no valid moves
                  value:
                    message: "No valid moves available for the bot"
                    api_version: "v1"
                    bot_id: "easy"

  /{api_version}/ybot/play:
    post:
      summary: Play a move on a board position
      description: |
        Given a YEN board state and an optional bot alias, the server plays one bot move
        on the board and returns the updated board state in YEN format.
        If no `bot_id` is provided, defaults to the `random` bot.
      parameters:
        - name: api_version
          in: path
          required: true
          description: API version (currently only "v1" is supported)
          schema:
            type: string
            enum: [v1]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayRequest'
            examples:
              play_example:
                summary: Play request with board state
                value:
                  position:
                    size: 3
                    turn: 0
                    players: ["B", "R"]
                    layout: "./B./.RB"
                  bot_id: easy
      responses:
        "200":
          description: Move played successfully or an error occurred
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PlayResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                success:
                  summary: Move played successfully
                  value:
                    api_version: "v1"
                    bot_id: "easy"
                    position:
                      size: 3
                      turn: 1
                      players: ["B", "R"]
                      layout: "B/B./.RB"
                invalid_yen:
                  summary: Invalid YEN format error
                  value:
                    message: "Invalid YEN format: unexpected character"
                    api_version: "v1"
                    bot_id: "easy"
                no_moves:
                  summary: No valid moves available
                  value:
                    message: "No valid moves available"
                    api_version: "v1"
                    bot_id: "easy"

components:
  schemas:
    YEN:
      type: object
      description: Y-game Exchange Notation board in JSON format
      required:
        - size
        - turn
        - players
        - layout
      properties:
        size:
          type: integer
          description: Board size
          example: 3
        turn:
          type: integer
          description: Index of the player whose turn it is to move
          enum: [ 0, 1 ]
          example: 0
        players:
          type: array
          description: Symbols representing players
          items:
            type: string
            enum: [ B, R ]
          example: [ "B", "R" ]
        layout:
          type: string
          description: |
            Board layout encoded in YEN format.
            
            Rows are separated by `/` and each character represents a cell:
            - `.` empty
            - `B` player B
            - `R` player R
          example: "./B./.RB"

    Coordinates:
      type: object
      description: |
        Barycentric coordinates (x, y, z) on the triangular board.
        They satisfy the invariant:

          x + y + z = size - 1
          x, y, z >= 0

        Each component represents the distance from one side of the triangle:
        - x = distance from side A
        - y = distance from side B
        - z = distance from side C
      required:
        - x
        - y
        - z
      properties:
        x:
          type: integer
          description: Barycentric coordinate (distance from side A)
          example: 1
        y:
          type: integer
          description: Barycentric coordinate (distance from side B)
          example: 1
        z:
          type: integer
          description: Barycentric coordinate (distance from side C)
          example: 0

    MoveResponse:
      type: object
      description: Response when a bot chooses a move.
      required:
        - api_version
        - bot_id
        - coords
      properties:
        api_version:
          type: string
          example: "v1"

        bot_id:
          type: string
          enum: [ easy, medium, hard ]
          example: "easy"

        coords:
          $ref: '#/components/schemas/Coordinates'

    PlayRequest:
      type: object
      required:
        - position
      properties:
        position:
          $ref: '#/components/schemas/YEN'
        bot_id:
          type: string
          description: Bot alias (defaults to "random" if omitted)
          enum: [easy, medium, hard]
          example: easy

    PlayResponse:
      type: object
      required:
        - api_version
        - bot_id
        - position
      properties:
        api_version:
          type: string
          example: "v1"
        bot_id:
          type: string
          enum: [easy, medium, hard]
          example: "easy"
        position:
          $ref: '#/components/schemas/YEN'

    ErrorResponse:
      type: object
      description: Error response (bot not found, invalid YEN, no valid moves)
      required:
        - message
      properties:
        message:
          type: string
          example: "Bot not found: unknown_bot"
        api_version:
          type: string
          nullable: true
          example: "v1"
        bot_id:
          type: string
          nullable: true
          example: "unknown_bot"
