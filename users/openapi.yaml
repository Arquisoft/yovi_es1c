openapi: 3.0.3
info:
  title: Users Service API
  version: 1.0.0
  description: |
    Current HTTP surface exposed by the TypeScript users microservice behind the gateway.
    This service is still minimal and does not expose the historical `/createuser` route.
servers:
  - url: /api/users
paths:
  /:
    get:
      summary: Service health/info endpoint
      responses:
        '200':
          description: Service is running
          content:
            text/plain:
              schema:
                type: string
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: Metrics payload
          content:
            text/plain:
              schema:
                type: string
