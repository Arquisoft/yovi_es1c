services:
  users:
    build: ./users
    container_name: users
    image: ghcr.io/arquisoft/yovi_es1c-users:${IMAGE_TAG:-latest}
    environment:
      - DB_DATA_DIR=/app/data
    expose:
      - "3000"
    networks:
      - monitor-net
    volumes:
      - ./users/data:/app/data

  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-changeme}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - monitor-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U auth_user -d authdb && psql -U auth_user -d authdb -c 'SELECT 1' -q --no-align -t" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  auth:
    build: ./auth
    container_name: auth
    image: ghcr.io/arquisoft/yovi_es1c-auth:${IMAGE_TAG:-latest}
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - PGHOST=auth-db
      - PGPORT=5432
      - PGDATABASE=authdb
      - PGUSER=auth_user
      - PGPASSWORD=${AUTH_DB_PASSWORD:-changeme}
    networks:
      - monitor-net
    depends_on:
      auth-db:
        condition: service_healthy

  webapp:
    build:
      context: ./webapp
      args:
        - VITE_API_URL=/api/users
        - VITE_GAMEY_API_URL=/api/gamey
    container_name: webapp
    image: ghcr.io/arquisoft/yovi_es1c-webapp:${IMAGE_TAG:-latest}
    expose:
      - "80"
    depends_on:
      - users
    networks:
      - monitor-net

  gamey:
    build: ./gamey
    container_name: gamey
    image: ghcr.io/arquisoft/yovi_es1c-gamey:${IMAGE_TAG:-latest}
    expose:
      - "4000"
    networks:
      - monitor-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - monitor-net

  game-db:
    image: postgres:16-alpine
    container_name: game-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gamedb
      POSTGRES_USER: game_user
      POSTGRES_PASSWORD: ${GAME_DB_PASSWORD:-changeme}
    volumes:
      - game-db-data:/var/lib/postgresql/data
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
    expose:
      - "5432"
    networks:
      - monitor-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U game_user -d gamedb && psql -U game_user -d gamedb -c 'SELECT 1' -q --no-align -t" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  gameservice:
    build: ./gameservice
    container_name: gameservice
    image: ghcr.io/arquisoft/yovi_es1c-gameservice:${IMAGE_TAG:-latest}
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - PGHOST=game-db
      - PGPORT=5432
      - PGDATABASE=gamedb
      - PGUSER=game_user
      - PGPASSWORD=${GAME_DB_PASSWORD:-changeme}
      - PGPOOL_MAX=50
      - AUTH_SERVICE_URL=http://auth:3001
      - GAMEY_SERVICE_URL=http://gamey:4000
      - REDIS_URL=redis://redis:6379
      - MM_TIMEOUT_SEC=30
      - TURN_TIMEOUT_SEC=25
      - RECONNECT_GRACE_SEC=45
    expose:
      - "3002"
    ports:
      - "3002:3002"
    depends_on:
      auth:
        condition: service_started
      redis:
        condition: service_started
      game-db:
        condition: service_healthy
    networks:
      - monitor-net
  certbot:
    build: ./nginx/certbot
    container_name: certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    command: >
      certonly
      --non-interactive
      --agree-tos
      --email ${CERTBOT_EMAIL:-admin@example.com}
      --authenticator dns-duckdns
      --dns-duckdns-token ${DUCKDNS_TOKEN}
      --dns-duckdns-propagation-seconds 60
      -d ${DUCKDNS_DOMAIN}.duckdns.org
    profiles:
      - certbot
    networks:
      - monitor-net

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - webapp
      - users
      - gamey
      - gameservice
      - auth
      - redis
    networks:
      - monitor-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
      - '--web.external-url=https://${PUBLIC_HOST:-localhost}/prometheus/'
      - '--web.route-prefix=/prometheus'
    networks:
      - monitor-net

  grafana:
    environment:
      - GF_SERVER_PROTOCOL=http
      - GF_SERVER_DOMAIN=${PUBLIC_HOST:-localhost}
      - GF_SERVER_ROOT_URL=https://${PUBLIC_HOST:-localhost}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_COOKIE_SECURE=false
    image: grafana/grafana
    container_name: grafana
    ports:
      - "9091:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  auth-db-data:
  game-db-data:
  letsencrypt: