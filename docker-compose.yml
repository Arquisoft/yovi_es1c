services:
  users:
    build: ./users
    container_name: users
    image: ghcr.io/arquisoft/yovi_es1c-users:latest
    expose:
      - "3000"
    networks:
      - monitor-net
    volumes:
      - ./users/data:/app/data

  auth:
    build: ./auth
    container_name: auth
    image: ghcr.io/arquisoft/yovi_es1c-auth:latest
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_DB_PATH=${AUTH_DB_PATH:-/app/auth/data/auth.db}
    networks:
      - monitor-net
    volumes:
      - ./auth/data:/app/auth/data

  webapp:
    build:
      context: ./webapp
      args:
        - VITE_API_URL=/api/users
        - VITE_GAMEY_API_URL=/api/gamey
    container_name: webapp
    image: ghcr.io/arquisoft/yovi_es1c-webapp:latest
    expose:
      - "80"
    depends_on:
      - users
    networks:
      - monitor-net

  gamey:
    build: ./gamey
    container_name: gamey
    image: ghcr.io/arquisoft/yovi_es1c-gamey:latest
    expose:
      - "4000"
    networks:
      - monitor-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - monitor-net

  gameservice:
    build: ./gameservice
    container_name: gameservice
    image: ghcr.io/arquisoft/yovi_es1c-gameservice:latest
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - GAME_DB_PATH=/app/data/game.db
      - AUTH_SERVICE_URL=http://auth:3001
      - REDIS_URL=redis://redis:6379
      - MM_TIMEOUT_SEC=30
      - TURN_TIMEOUT_SEC=25
      - RECONNECT_GRACE_SEC=45
    volumes:
      - ./gameservice/data:/app/data
    expose:
      - "3002"
    ports:
      - "3002:3002"
    depends_on:
      - auth
      - redis
    networks:
      - monitor-net

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /webapp/dist:/usr/share/nginx/html:ro
    depends_on:
      - webapp
      - users
      - gamey
      - gameservice
      - auth
      - redis
    networks:
      - monitor-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./users/monitoring/prometheus:/etc/prometheus
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "9091:3000"
    volumes:
      - ./users/monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge
