name: Release — Test, Build, Publish, Deploy

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.event.release.tag_name }}

jobs:
  test-no-db:
    name: Tests (webapp, users)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ webapp, users ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd ${{ matrix.service }} && npm ci
      - run: cd ${{ matrix.service }} && npm test

  test-auth-db:
    name: Tests (auth)
    runs-on: ubuntu-latest
    services:
      postgres-auth:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: authdb
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U auth_user -d authdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd auth && npm ci
      - run: cd auth && npm test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: authdb
          PGUSER: auth_user
          PGPASSWORD: changeme

  test-game-db:
    name: Tests (gameservice)
    runs-on: ubuntu-latest
    services:
      postgres-game:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gamedb
          POSTGRES_USER: game_user
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U game_user -d gamedb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd gameservice && npm ci
      - run: cd gameservice && npm test
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: gamedb
          PGUSER: game_user
          PGPASSWORD: changeme

  test-rust:
    name: Run rust (gamey) tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: |
          cd gamey
          cargo test

  e2e:
    name: Run E2E tests
    runs-on: ubuntu-latest
    needs: [test-no-db, test-auth-db, test-game-db, test-rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install webapp dependencies for Playwright
        run: |
          cd webapp
          npm ci

      - name: Install Playwright browsers
        run: |
          cd webapp
          npm run test:e2e:install-browsers
      - name: Generate self-signed cert for CI
        run: |
            mkdir -p nginx/certs
            openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
              -keyout nginx/certs/privkey.pem \
              -out nginx/certs/fullchain.pem \
              -subj "/CN=localhost"

      - name: Build and start all services with Docker Compose
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for nginx to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' nginx_proxy 2>/dev/null || echo "none")
            echo "Attempt $i: nginx status = $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Nginx is healthy!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Timeout waiting for nginx"
              docker compose logs nginx
              exit 1
            fi
            sleep 3
          done


      - name: Show running containers
        run: |
          docker compose ps

      - name: Run E2E tests against Docker environment
        run: |
          cd webapp
          npm run test:e2e:docker

      - name: Show Docker logs on failure
        if: failure()
        run: |
          echo "=== Nginx logs ==="
          docker compose logs nginx
          echo "=== Users Service logs ==="
          docker compose logs users
          echo "=== Auth Service logs ==="
          docker compose logs auth
          echo "=== Game Server logs ==="
          docker compose logs gamey
          echo "=== Webapp logs ==="
          docker compose logs webapp

      - name: Stop Docker Compose
        if: always()
        run: |
          docker compose down -v

  docker-push-users:
    name: Publish users image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (users)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-users
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: users
          tags: "latest,${{ env.IMAGE_TAG }}"

  docker-push-auth:
    name: Publish auth image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (auth)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-auth
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: auth
          tags: "latest,${{ env.IMAGE_TAG }}"

  docker-push-webapp:
    name: Publish webapp image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (webapp)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-webapp
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: webapp
          buildargs: VITE_API_URL=/api/users,VITE_GAMEY_API_URL=/api/gamey
          tags: "latest,${{ env.IMAGE_TAG }}"

  docker-push-gamey:
    name: Publish gamey image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (gamey)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gamey
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gamey
          tags: "latest,${{ env.IMAGE_TAG }}"

  docker-push-gameservice:
    name: Publish gameservice image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (gameservice)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gameservice
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gameservice
          tags: "latest,${{ env.IMAGE_TAG }}"
  resolve-host:
    name: Resolve deploy host from DuckDNS
    runs-on: ubuntu-latest
    needs: [ docker-push-users, docker-push-auth, docker-push-webapp, docker-push-gamey, docker-push-gameservice ]
    outputs:
      deploy_host: ${{ steps.dns.outputs.host }}
    steps:
      - name: Resolve DuckDNS domain (authoritative)
        id: dns
        run: |
          echo "Resolving ${{ secrets.DUCKDNS_DOMAIN }}.duckdns.org (authoritative)..."
          IP=$(dig +short @ns1.duckdns.org ${{ secrets.DUCKDNS_DOMAIN }}.duckdns.org | tail -1)
          if [ -z "$IP" ]; then
            echo "ERROR: Could not resolve domain against DuckDNS nameserver."
            exit 1
          fi
          echo "Resolved IP: $IP"
          echo "host=$IP" >> $GITHUB_OUTPUT
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: [ resolve-host ]
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          GAME_DB_PASSWORD: ${{ secrets.GAME_DB_PASSWORD }}
          AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD }}
          DUCKDNS_DOMAIN: ${{ secrets.DUCKDNS_DOMAIN }}
          DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
        with:
          host: ${{ needs.resolve-host.outputs.deploy_host }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: JWT_SECRET,IMAGE_TAG,GAME_DB_PASSWORD,AUTH_DB_PASSWORD,DUCKDNS_DOMAIN,DUCKDNS_TOKEN
          timeout: 60s
          command_timeout: 30m
          script: |
            set -euo pipefail

            RAW="https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${IMAGE_TAG}"
            PROJECT_NAME="$(basename "$PWD")"
            LETSENCRYPT_VOLUME="${PROJECT_NAME}_letsencrypt"
            DOMAIN="${DUCKDNS_DOMAIN}.duckdns.org"

            echo "Usando proyecto docker-compose: ${PROJECT_NAME}"
            echo "Usando volumen letsencrypt: ${LETSENCRYPT_VOLUME}"
            echo "Usando dominio: ${DOMAIN}"
            echo "Usando release/tag: ${IMAGE_TAG}"

            # Crear estructura de directorios
            mkdir -p nginx/certbot
            mkdir -p nginx/certs
            mkdir -p monitoring/prometheus
            mkdir -p monitoring/grafana/provisioning/datasources
            mkdir -p monitoring/grafana/provisioning/dashboards
            mkdir -p users/data

            # Ficheros raíz
            wget -q "$RAW/docker-compose.yml" -O docker-compose.yml

            # Nginx
            wget -q "$RAW/nginx/nginx.conf" -O nginx/nginx.conf
            wget -q "$RAW/nginx/certbot/Dockerfile" -O nginx/certbot/Dockerfile

            # Prometheus
            wget -q "$RAW/monitoring/prometheus/prometheus.yml" -O monitoring/prometheus/prometheus.yml

            # Grafana
            wget -q "$RAW/monitoring/grafana/grafana.ini" -O monitoring/grafana/grafana.ini
            wget -q "$RAW/monitoring/grafana/provisioning/datasources/datasource.yml" -O monitoring/grafana/provisioning/datasources/datasource.yml
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/dashboard.yml" -O monitoring/grafana/provisioning/dashboards/dashboard.yml
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/dashboard.json" -O monitoring/grafana/provisioning/dashboards/dashboard.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/auth-internals.json" -O monitoring/grafana/provisioning/dashboards/auth-internals.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/auth-overview.json" -O monitoring/grafana/provisioning/dashboards/auth-overview.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/gameservice-overview.json" -O monitoring/grafana/provisioning/dashboards/gameservice-overview.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/gamey-overview.json" -O monitoring/grafana/provisioning/dashboards/gamey-overview.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/online-realtime.json" -O monitoring/grafana/provisioning/dashboards/online-realtime.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/yovi-overview.json" -O monitoring/grafana/provisioning/dashboards/yovi-overview.json

            # .env a partir de la plantilla
            wget -q "$RAW/.env.example" -O .env.example
            grep -Ev '^(JWT_SECRET|AUTH_DB_PASSWORD|GAME_DB_PASSWORD|DUCKDNS_TOKEN|DUCKDNS_DOMAIN|IMAGE_TAG)=' .env.example > .env || true
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> .env
            printf 'AUTH_DB_PASSWORD=%s\n' "$AUTH_DB_PASSWORD" >> .env
            printf 'GAME_DB_PASSWORD=%s\n' "$GAME_DB_PASSWORD" >> .env
            printf 'DUCKDNS_TOKEN=%s\n' "$DUCKDNS_TOKEN" >> .env
            printf 'DUCKDNS_DOMAIN=%s\n' "$DUCKDNS_DOMAIN" >> .env
            printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG" >> .env

            find_cert_name() {
              docker run --rm -v "${LETSENCRYPT_VOLUME}:/letsencrypt:ro" alpine sh -c '
              if [ -f "/letsencrypt/live/'"${DOMAIN}"'/fullchain.pem" ] && [ -f "/letsencrypt/live/'"${DOMAIN}"'/privkey.pem" ]; then
              printf "%s\n" "'"${DOMAIN}"'"
              exit 0
              fi
                
              for f in /letsencrypt/renewal/*.conf; do
              [ -e "$f" ] || continue
              if grep -q "domains = .*'"${DOMAIN}"'" "$f"; then
                basename "$f" .conf
                exit 0
              fi
              done
              
              exit 0
              '
            }

            CERT_NAME="$(find_cert_name || true)"

            if [ -z "$CERT_NAME" ]; then
              echo "Certificado no encontrado, ejecutando certbot..."
              docker-compose --profile certbot run --rm certbot
              CERT_NAME="$(find_cert_name || true)"
            else
              echo "Certificado ya existe (cert name: ${CERT_NAME}), saltando certbot."
            fi

            if [ -z "$CERT_NAME" ]; then
              echo "ERROR: No he podido localizar un certificado para ${DOMAIN} dentro del volumen ${LETSENCRYPT_VOLUME}"
              echo "Contenido de /letsencrypt/live:"
              docker run --rm -v "${LETSENCRYPT_VOLUME}:/letsencrypt:ro" alpine sh -c 'find /letsencrypt/live -mindepth 1 -maxdepth 1 -type d -printf "%f\n" 2>/dev/null || true'
              echo "Contenido de /letsencrypt/renewal:"
              docker run --rm -v "${LETSENCRYPT_VOLUME}:/letsencrypt:ro" alpine sh -c 'ls -1 /letsencrypt/renewal 2>/dev/null || true'
              exit 1
            fi

            echo "Usando cert name: ${CERT_NAME}"

            LOCAL_UID="$(id -u)"
            LOCAL_GID="$(id -g)"
            
            docker run --rm \
            -v "${LETSENCRYPT_VOLUME}:/letsencrypt:ro" \
            -v "$(pwd)/nginx/certs:/certs" \
            alpine sh -c "
            cp -L \"/letsencrypt/live/${CERT_NAME}/fullchain.pem\" /certs/fullchain.pem &&
            cp -L \"/letsencrypt/live/${CERT_NAME}/privkey.pem\" /certs/privkey.pem &&
            chown ${LOCAL_UID}:${LOCAL_GID} /certs/fullchain.pem /certs/privkey.pem &&
            chmod 644 /certs/fullchain.pem &&
            chmod 600 /certs/privkey.pem
            "

            # Login en GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export JWT_SECRET="${JWT_SECRET}"
            export IMAGE_TAG="${IMAGE_TAG}"
            export GAME_DB_PASSWORD="${GAME_DB_PASSWORD}"
            export AUTH_DB_PASSWORD="${AUTH_DB_PASSWORD}"

            # Deploy
            docker-compose down
            docker-compose pull
            docker-compose up -d
