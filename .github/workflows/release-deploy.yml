name: Release — Test, Build, Publish, Deploy

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.event.release.tag_name }}

jobs:
  test-node:
    name: Run node unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [webapp, users, auth]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          npm test

  test-rust:
    name: Run rust (gamey) tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: |
          cd gamey
          cargo test

  e2e:
    name: Run E2E tests
    runs-on: ubuntu-latest
    needs: [test-node, test-rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install webapp dependencies for Playwright
        run: |
          cd webapp
          npm ci

      - name: Install Playwright browsers
        run: |
          cd webapp
          npm run test:e2e:install-browsers

      - name: Build and start all services with Docker Compose
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to start..."
          sleep 15
          echo "Checking Nginx health..."
          curl --retry 15 --retry-delay 2 --retry-connrefused http://localhost/health || (docker compose logs && exit 1)
          echo "Waiting for auth service to be ready..."
          curl --retry 20 --retry-delay 3 --retry-connrefused -X POST http://localhost/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"healthcheck_probe","password":"probe12345"}' \
            -o /dev/null -s || true
          sleep 3
          echo "Services are ready!"
      

      - name: Show running containers
        run: |
          docker compose ps

      - name: Run E2E tests against Docker environment
        run: |
          cd webapp
          npm run test:e2e:docker

      - name: Show Docker logs on failure
        if: failure()
        run: |
          echo "=== Nginx logs ==="
          docker compose logs nginx
          echo "=== Users Service logs ==="
          docker compose logs users
          echo "=== Auth Service logs ==="
          docker compose logs auth
          echo "=== Game Server logs ==="
          docker compose logs gamey
          echo "=== Webapp logs ==="
          docker compose logs webapp

      - name: Stop Docker Compose
        if: always()
        run: |
          docker compose down -v

  docker-push-users:
    name: Publish users image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (users)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-users
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: users
          tags: "latest,${{ env.IMAGE_TAG }}"

  docker-push-auth:
    name: Publish auth image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (auth)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-auth
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: auth
          tags: "latest,${{ env.IMAGE_TAG }}"

  docker-push-webapp:
    name: Publish webapp image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (webapp)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-webapp
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: webapp
          buildargs: VITE_API_URL=/api/users,VITE_GAMEY_API_URL=/api/gamey
          tags: "latest,${{ env.IMAGE_TAG }}"

  docker-push-gamey:
    name: Publish gamey image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (gamey)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gamey
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gamey
          tags: "latest,${{ env.IMAGE_TAG }}"

  docker-push-gameservice:
    name: Publish gameservice image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (gameservice)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gameservice
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gameservice
          tags: "latest,${{ env.IMAGE_TAG }}"

  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: [ docker-push-users, docker-push-auth, docker-push-webapp, docker-push-gamey, docker-push-gameservice ]
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: JWT_SECRET,IMAGE_TAG
          script: |
            RAW="https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/master"

            # Crear estructura de directorios
            mkdir -p nginx
            mkdir -p monitoring/prometheus
            mkdir -p monitoring/grafana/provisioning/datasources
            mkdir -p monitoring/grafana/provisioning/dashboards
            mkdir -p users/data
            mkdir -p auth/data
            mkdir -p gameservice/data

            # Ficheros raíz
            wget -q "$RAW/docker-compose.yml" -O docker-compose.yml

            # Nginx
            wget -q "$RAW/nginx/nginx.conf" -O nginx/nginx.conf

            # Prometheus
            wget -q "$RAW/monitoring/prometheus/prometheus.yml" -O monitoring/prometheus/prometheus.yml

            # Grafana — fichero de config principal
            wget -q "$RAW/monitoring/grafana/grafana.ini" -O monitoring/grafana/grafana.ini

            # Grafana — datasources
            wget -q "$RAW/monitoring/grafana/provisioning/datasources/datasource.yml" -O monitoring/grafana/provisioning/datasources/datasource.yml

            # Grafana — dashboards config + JSONs
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/dashboard.yml" -O monitoring/grafana/provisioning/dashboards/dashboard.yml
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/dashboard.json" -O monitoring/grafana/provisioning/dashboards/dashboard.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/auth-internals.json" -O monitoring/grafana/provisioning/dashboards/auth-internals.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/auth-overview.json" -O monitoring/grafana/provisioning/dashboards/auth-overview.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/gameservice-overview.json" -O monitoring/grafana/provisioning/dashboards/gameservice-overview.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/gamey-overview.json" -O monitoring/grafana/provisioning/dashboards/gamey-overview.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/online-realtime.json" -O monitoring/grafana/provisioning/dashboards/online-realtime.json
            wget -q "$RAW/monitoring/grafana/provisioning/dashboards/yovi-overview.json" -O monitoring/grafana/provisioning/dashboards/yovi-overview.json

            # Deploy
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export JWT_SECRET="$JWT_SECRET"
            export IMAGE_TAG="$IMAGE_TAG"
            docker compose down
            docker compose pull
            docker compose up -d
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

